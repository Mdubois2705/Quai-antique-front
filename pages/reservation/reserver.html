<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Réserver une table</h1>
    </div>
</div>

<div class="formsign">
    <div class="container mt-4 mb-4">
        <form>
            <div class="mb-3">
                <label for="NomInput" class="form-label">Nom</label>
                <input disabled type="text" class="form-control" id="NomInput" placeholder="Nom" value="Dupont">
            </div>
            <div class="mb-3">
                <label for="PrenomInput" class="form-label">Prénom</label>
                <input disabled type="text" class="form-control" id="PrenomInput" placeholder="Prénom" value="Jean">
            </div>
            <div class="mb-3">
                <label for="AllergieInput" class="form-label">Allergies</label>
                <input type="text" class="form-control" id="AllergieInput" placeholder="Vos allergies"
                    value="arachides, gluten">
            </div>
            <div class="mb-3">
                <label for="ConviveInput" class="form-label">Convives</label>
                <input type="number" class="form-control" id="ConviveInput" placeholder="Nombre de Convives" value="2">
            </div>
            <div class="mb-3">
                <label for="dateInput" class="form-label">Date</label>
                <input type="date" class="form-control" id="dateInput">
            </div>
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="serviceChoisi" id="midiradio">
                    <label class="form-check-label" for="midiradio">
                        Midi
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="serviceChoisi" id="soirradio">
                    <label class="form-check-label" for="soirradio">
                        Soir
                    </label>
                </div>
            </div>
            <div class="mb-3">
                <label for="selecthour" class="form-label">Heure</label>
                <select class="form-select" id="selecthour">
                    <option>19:30</option>
                    <option>19:45</option>
                    <option>20:00</option>
                    <option>20:15</option>
                    <option>20:30</option>
                    <option>20:45</option>
                    <option>21:00</option>
                </select>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Réserver</button>
                <button type="button" class="btn btn-danger">Annuler</button>
            </div>
        </form>
    </div>
</div>
