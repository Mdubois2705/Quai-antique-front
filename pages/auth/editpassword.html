<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Modifier mon mot de passe</h1>
    </div>
</div>

<div class="formsign">
    <div class="container mt-4 mb-4">
        <form>
            <div class="mb-3">
                <label for="currentPasswordInput" class="form-label">Mot de passe actuel</label>
                <input type="password" class="form-control" id="currentPasswordInput" placeholder="Mot de passe actuel">
            </div>
            <div class="mb-3">
                <label for="passwordInput" class="form-label">Nouveau mot de passe</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="Nouveau mot de passe">
            </div>
            <div class="mb-3">
                <label for="confirmPasswordInput" class="form-label">Confirmer le nouveau mot de passe</label>
                <input type="password" class="form-control" id="confirmPasswordInput" placeholder="Confirmer le nouveau mot de passe">
            </div>
            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary">Modifier mon mot de passe</button>
            </div>
        </form>
         <div class="text-center mt-3">
            <a href="/account" class="btn btn-link">Retour à mon compte</a>
        </div>
    </div>
</div>
