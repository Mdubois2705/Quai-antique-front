<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Inscription</h1>
    </div>
</div>

<div class="formsign">
    <div class="container mt-4 mb-4">
        <form>
            <div class="mb-3">
                <label for="NomInput" class="form-label">Nom</label>
                <input type="text" class="form-control" id="NomInput" placeholder="Nom">
            </div>
            <div class="mb-3">
                <label for="PrenomInput" class="form-label">Prénom</label>
                <input type="text" class="form-control" id="PrenomInput" placeholder="Prénom">
            </div>
            <div class="mb-3">
                <label for="EmailInput" class="form-label">Email</label>
                <input type="email" class="form-control" id="EmailInput" placeholder="Email@exemple.com">
            </div>
            <div class="mb-3">
                <label for="TelInput" class="form-label">Téléphone</label>
                <input type="text" class="form-control" id="TelInput" placeholder="Téléphone">
            </div>
            <div class="mb-3">
                <label for="PasswordInput" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="PasswordInput" placeholder="Mot de passe">
            </div>
            <div class="mb-3">
                <label for="ConfirmPasswordInput" class="form-label">Confirmer le mot de passe</label>
                <input type="password" class="form-control" id="ConfirmPasswordInput"
                    placeholder="Confirmer le mot de passe">
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary">S'inscrire</button>
            </div>
        </form>
        <div class="text-center mt-3">
            <a href="/signin" class="btn btn-link">Déjà un compte ? Se connecter</a>
        </div>
    </div>
</div>
