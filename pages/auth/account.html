<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Mon Compte</h1>
    </div>
</div>

<div class="formsign">
    <div class="container mt-4 mb-4">
        <form>
            <div class="mb-3">
                <label for="NomInput" class="form-label">Nom</label>
                <input type="text" class="form-control" id="NomInput" placeholder="Nom" value="Dupont">
            </div>
            <div class="mb-3">
                <label for="PrenomInput" class="form-label">Prénom</label>
                <input type="text" class="form-control" id="PrenomInput" placeholder="Prénom" value="Jean">
            </div>
            <div class="mb-3">
                <label for="TelInput" class="form-label">Téléphone</label> 
                <input type="text" class="form-control" id="TelInput" placeholder="Téléphone" value="07 12 34 56 78">
            </div>
            <div class="mb-3">
                <label for="AllergieInput" class="form-label">Allergies</label>
                <input type="text" class="form-control" id="AllergieInput" placeholder="Vos allergies" value="arachides, gluten">
            </div>
            <div class="mb-3">
                <label for="ConviveInput" class="form-label">Convives</label>
                <input type="number" class="form-control" id="ConviveInput" placeholder="Nombre de Convives" value="2">
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Modifier mes informations</button>
                <button type="button" class="btn btn-danger">Supprimer mon compte</button>
            </div>
            <div class="text-center mt-3">
                <a href="/editpassword" class="btn btn-link">Modifier mon mot de passe</a>
            </div>
        </form>
    </div>
</div>
